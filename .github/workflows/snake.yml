name: Generate Contribution Snake

# Builds the animated contribution-grid snake and pushes the SVGs to the
# `output` branch, where the README's <picture> tag reads them from.

on:
  schedule:
    - cron: "0 */12 * * *"   # twice a day
  workflow_dispatch:          # lets you run it manually from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#22D3EE&color_dots=#161b22,#1f6feb,#22d3ee,#a855f7,#ffffff

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
